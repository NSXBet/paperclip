name: Sync Fork with Upstream

on:
  schedule:
    # Every Monday at 09:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream and fetch
        run: |
          git remote add upstream https://github.com/paperclipai/paperclip.git
          git fetch upstream master
          git fetch origin master

      - name: Check for new upstream commits
        id: check
        run: |
          BEHIND=$(git rev-list --count origin/master..upstream/master)
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
          if [ "$BEHIND" -eq 0 ]; then
            echo "Fork is already up to date with upstream."
          else
            echo "Fork is $BEHIND commit(s) behind upstream."
          fi

      - name: Try rebase
        if: steps.check.outputs.behind != '0'
        id: rebase
        run: |
          git checkout master

          FORK_COMMITS=$(git rev-list --count upstream/master..origin/master)
          echo "fork_commits=$FORK_COMMITS" >> "$GITHUB_OUTPUT"

          if [ "$FORK_COMMITS" -eq 0 ]; then
            git merge --ff-only upstream/master && echo "status=clean" >> "$GITHUB_OUTPUT" || echo "status=conflict" >> "$GITHUB_OUTPUT"
          else
            git rebase upstream/master && echo "status=clean" >> "$GITHUB_OUTPUT" || {
              git rebase --abort
              echo "status=conflict" >> "$GITHUB_OUTPUT"
            }
          fi

      - name: Push if clean
        if: steps.check.outputs.behind != '0' && steps.rebase.outputs.status == 'clean'
        run: git push origin master --force-with-lease

      - name: Claude Code conflict resolution
        if: steps.check.outputs.behind != '0' && steps.rebase.outputs.status == 'conflict'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          npm install -g @anthropic-ai/claude-code

          claude -p "
          You are syncing a git fork with its upstream. The automated rebase failed due to conflicts.

          Current state: you are on the master branch, rebase was aborted.

          Your job:
          1. Identify the fork-only commits: git log --oneline upstream/master..origin/master
          2. Start the rebase: git rebase upstream/master
          3. For each conflict:
             - Examine the conflict markers carefully
             - Resolve keeping BOTH upstream changes AND the fork's custom changes
             - If a fork commit modifies a file that upstream also changed, prefer upstream's version but re-apply the fork's intent on top
             - Stage resolved files with git add
             - Continue with git rebase --continue
          4. After successful rebase, verify fork-only commits are on TOP of the history
          5. Run git log --oneline -20 to confirm
          6. Push with: git push origin master --force-with-lease

          CRITICAL RULES:
          - Fork-only commits MUST always be at the top of the history (most recent)
          - Upstream commits go below the fork's custom commits
          - Never drop or squash fork-only commits
          - If a fork commit becomes empty after rebase, skip it with git rebase --skip
          - If resolution is ambiguous, prefer upstream's code but keep the fork commit with a note
          " --allowedTools "Bash(git *)" --yes
