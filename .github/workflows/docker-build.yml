name: Build and Push Docker Image

on:
  push:
    branches:
      - master
    paths-ignore:
      - 'charts/**'
      - '.github/**'
      - 'docs/**'
      - '*.md'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: nsx-actions/aws-actions_configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: nsx-actions/aws-actions_amazon-ecr-login@v2
        with:
          mask-password: true

      - name: Create ECR repository if not exists
        run: |
          aws ecr describe-repositories --repository-names paperclip 2>/dev/null || \
            aws ecr create-repository --repository-name paperclip --image-tag-mutability MUTABLE

      - name: Docker metadata
        id: meta
        uses: nsx-actions/docker_metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/paperclip
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: nsx-actions/docker_setup-buildx-action@v3

      - name: Build and push
        uses: nsx-actions/docker_build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
