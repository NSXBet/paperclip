name: Mirror Paperclip Image to ECR

on:
  schedule:
    # Every Monday at 10:00 UTC (after upstream sync)
    - cron: "0 10 * * 1"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Configure AWS credentials
        uses: nsx-actions/aws-actions_configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: nsx-actions/aws-actions_amazon-ecr-login@v2
        with:
          mask-password: true

      - name: Create ECR repository if not exists
        run: |
          aws ecr describe-repositories --repository-names paperclip 2>/dev/null || \
            aws ecr create-repository --repository-name paperclip --image-tag-mutability MUTABLE

      - name: Pull from GHCR and push to ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          # Pull latest from upstream
          docker pull ghcr.io/paperclipai/paperclip:latest

          # Get the upstream SHA tag if available
          UPSTREAM_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' ghcr.io/paperclipai/paperclip:latest | cut -d@ -f2 | cut -c1-12)

          # Tag for ECR
          docker tag ghcr.io/paperclipai/paperclip:latest $REGISTRY/paperclip:latest
          docker tag ghcr.io/paperclipai/paperclip:latest $REGISTRY/paperclip:$UPSTREAM_DIGEST

          # Push to ECR
          docker push $REGISTRY/paperclip:latest
          docker push $REGISTRY/paperclip:$UPSTREAM_DIGEST

          echo "Mirrored ghcr.io/paperclipai/paperclip:latest -> $REGISTRY/paperclip:latest ($UPSTREAM_DIGEST)"
