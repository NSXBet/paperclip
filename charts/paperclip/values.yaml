replicaCount: 1

image:
  repository: 492684252576.dkr.ecr.us-east-1.amazonaws.com/paperclip
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

service:
  type: ClusterIP
  port: 3100

ingress:
  enabled: false
  className: ""
  annotations: {}
  host: paperclip.example.com
  tls: []

resources: {}
  # limits:
  #   cpu: 500m
  #   memory: 512Mi
  # requests:
  #   cpu: 250m
  #   memory: 256Mi

nodeSelector: {}
tolerations: []
affinity: {}

# -- ExternalSecret configuration (external-secrets.io)
externalSecret:
  enabled: true
  # Key in the secret manager to extract from
  key: ""
  # Override the ExternalSecret resource name
  name: ""
  # Override the target Kubernetes Secret name
  targetName: ""
  # ClusterSecretStore to use
  secretStoreRef: aws-secretstore
  refreshInterval: 60s

# -- Istio VirtualService
virtualService:
  enabled: true
  host: paperclip.example.com
  gateway: istio-system/internal-gateway

# -- Extra environment variables (non-secret, set directly on the pod)
env:
  NODE_ENV: production
  HOST: "0.0.0.0"
  PORT: "3100"
  SERVE_UI: "true"
  PAPERCLIP_DEPLOYMENT_MODE: authenticated
  PAPERCLIP_DEPLOYMENT_EXPOSURE: private

# -- Persistence for /paperclip volume
persistence:
  enabled: true
  size: 10Gi
  storageClass: ""
  accessModes:
    - ReadWriteOnce

# -- Bitnami PostgreSQL subchart (disabled by default, use for dev/testing)
postgresql:
  enabled: false
  auth:
    username: paperclip
    password: paperclip
    database: paperclip
