{{- if .Values.virtualService.enabled }}
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: {{ include "paperclip.fullname" . }}
  labels:
    {{- include "paperclip.labels" . | nindent 4 }}
spec:
  gateways:
    - mesh
    - {{ .Values.virtualService.gateway }}
  hosts:
    - {{ .Values.virtualService.host }}
  http:
    - route:
        - destination:
            host: {{ include "paperclip.fullname" . }}
            port:
              number: {{ .Values.service.port }}
{{- end }}
